name: gromacs
description: GROMACS molecular dynamics benchmark
tags: [sciapp, gromacs, cpugpu]
systems: ['*']
environ: gnu
spack_spec: gromacs@2024.2
binary: gmx_mpi
time_limit: 60m
perf_unit: ns/day
perf_regex: r'Performance:\s+(\S+)'

benchmarks:
  - name: gromacs_cpu
    class_name: GromacsCpuBench
    params:
      nsteps: [5000]
    num_tasks: 16
    tags: [sciapp, gromacs, cpu, nightly]

  - name: gromacs_gpu
    class_name: GromacsGpuBench
    params:
      nsteps: [5000]
    num_tasks: 4
    num_gpus_per_node: 1
    tags: [sciapp, gromacs, gpu, nightly]
