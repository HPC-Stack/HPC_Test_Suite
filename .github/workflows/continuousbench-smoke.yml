# Continus Bench smoke test workflow
# Runs on PRs targeting main to validate benchmark specification changes.
#
# Prerequisites:
#   - Self-hosted runner with Python 3.8+
#   - GH secrets: CI_SSH_KEY, CI_SSH_HOST, CI_SSH_USER

name: Continus Bench Smoke

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  smoke-test:
    runs-on: [self-hosted]
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Set ReFrame Environment
        run: |
          export RFM_CONFIG_FILES="${PWD}/config/common/settings.py:${PWD}/config/environments/settings.py:${PWD}/config/pseudo-cluster/settings.py"
          export RFM_CHECK_SEARCH_PATH="${PWD}"
          export RFM_CHECK_SEARCH_RECURSIVE=yes
          export RFM_GENERATE_FILE_REPORTS=true
          echo "RFM_CONFIG_FILES=$RFM_CONFIG_FILES"
          echo "RFM_CHECK_SEARCH_PATH=$RFM_CHECK_SEARCH_PATH"
          reframe --version

      - name: List Smoke Tests
        run: |
          export RFM_CONFIG_FILES="${PWD}/config/common/settings.py:${PWD}/config/environments/settings.py:${PWD}/config/pseudo-cluster/settings.py"
          export RFM_CHECK_SEARCH_PATH="${PWD}"
          export RFM_CHECK_SEARCH_RECURSIVE=yes
          reframe -c . -t smoke -l

      - name: Run Smoke Tests
        run: |
          export RFM_CONFIG_FILES="${PWD}/config/common/settings.py:${PWD}/config/environments/settings.py:${PWD}/config/pseudo-cluster/settings.py"
          export RFM_CHECK_SEARCH_PATH="${PWD}"
          export RFM_CHECK_SEARCH_RECURSIVE=yes
          export RFM_GENERATE_FILE_REPORTS=true
          reframe -c . -t smoke \
            -S valid_systems=paramrudra.snbose:cpu \
            -S valid_prog_environs=gnu \
            --report-file=smoke_report.json \
            -r

      - name: Capture Environment
        run: |
          bash scripts/env_snapshot.sh runner_env.json

      - name: Generate Report
        run: |
          python3 scripts/generate_report.py smoke_report.json smoke_report.html

      - name: Upload Report Artifact
        uses: actions/upload-artifact@v3
        with:
          name: smoke-report
          path: smoke_report.html
          retention-days: 30
